services:
  - type: web
    name: fithub-back
    env: node
    branch: sebadev # Cambiá por tu rama principal
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fithub-test # Nombre de tu DB en Render
          property: connectionString
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false

databases:
  - name: fithub-db
    plan: free
